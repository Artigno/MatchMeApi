service: mirror-match

# Set your team ID if you are using Bref Cloud (https://bref.sh/cloud)
#bref:
#    team: my-team-id

provider:
    name: aws
    # The AWS region in which to deploy (us-east-1 is the default)
    region: eu-central-1
    # Environment variables
    environment:
        APP_ENV: ${param:appEnv}
        APP_KEY: ${ssm:/mirror-match/${sls:stage}/APP_KEY}
        APP_DEBUG: ${param:debug}
        # Uncomment the line below if you uncomment `constructs.website`
        #APP_URL: ${construct:website.url}
        SESSION_DRIVER: cookie # Change to database if you have set up a database
        # Maintenance mode: https://bref.sh/docs/laravel/maintenance-mode
        MAINTENANCE_MODE: ${param:maintenance, null}
        # Logging configuration: https://bref.sh/docs/environment/logs
        LOG_CHANNEL: stderr
        LOG_STDERR_FORMATTER: Bref\Monolog\CloudWatchFormatter
        # Database configuration: https://bref.sh/docs/environment/database
        DB_CONNECTION: pgsql
        DB_URL: ${ssm:/mirror-match/${sls:stage}/DB_URL}
        OPENROUTER_API_KEY: ${ssm:/mirror-match/${sls:stage}/OPENROUTER_API_KEY}
        OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
        AI_VISION_MODEL: google/gemini-2.0-flash
        # Supabase project URL — used to fetch JWKS for ES256/RS256 token verification
        SUPABASE_URL: ${ssm:/mirror-match/${sls:stage}/SUPABASE_URL}
        # Queue configuration: https://bref.sh/docs/laravel/queues
        #QUEUE_CONNECTION: sqs
        #SQS_QUEUE: ${construct:jobs.queueUrl}
        # Filesystem configuration: https://bref.sh/docs/laravel/filesystem
        #FILESYSTEM_DISK: s3
        #AWS_BUCKET: ${construct:storage.bucketName}

functions:

    # This function runs the Laravel website/API
    web:
        handler: public/index.php
        runtime: php-82-fpm
        timeout: 28 # in seconds (API Gateway has a timeout of 29 seconds)
        events:
            - httpApi: '*'

    # This function lets us run artisan commands in Lambda
    artisan:
        handler: artisan
        runtime: php-82-console
        timeout: 720 # in seconds
        # Uncomment to also run the scheduler every minute
        #events:
        #    - schedule:
        #          rate: rate(1 minute)
        #          input: '"schedule:run"'

constructs: {}
    # SQS queue for Laravel jobs
    # See https://bref.sh/docs/laravel/queues
    #jobs:
    #    type: queue
    #    worker:
    #        handler: Bref\LaravelBridge\Queue\QueueHandler
    #        runtime: php-82
    #        timeout: 60 # seconds

    # S3 bucket for file storage
    #storage:
    #    type: storage
    #    lifecycleRules:
    #        # Files in the `tmp/` folder will be cleaned after 1 day (e.g. failed uploads, temp files, etc.)
    #        -   prefix: tmp/
    #            expirationInDays: 1
    #    # S3 buckets have ACLs disabled by default since 2023, but Laravel/Flysystem sends ACL
    #    # headers on every S3 operation. This setting avoids errors (the bucket stays 100% private).
    #    allowAcl: true
    #    # CORS is required for uploading files from the browser via presigned URLs, put the URL of your website here
    #    # See https://bref.sh/docs/laravel/file-storage#large-files and https://github.com/getlift/lift/blob/master/docs/storage.md#cors
    #    cors: ${construct:website.url}

    # CloudFront + S3 for website assets (compatible with Inertia, Livewire, etc.)
    # See https://bref.sh/docs/use-cases/websites
    #website:
    #    type: server-side-website
    #    assets:
    #        '/build/*': public/build
    #        #'/vendor/*': public/vendor # Uncomment if the public/vendor exists
    #        '/favicon.ico': public/favicon.ico
    #        '/robots.txt': public/robots.txt

# Environment-specific parameters
# See https://github.com/oss-serverless/serverless/blob/main/docs/guides/parameters.md
params:
    default:
        # Laravel's APP_ENV. See https://bref.sh/docs/laravel/environments
        appEnv: ${sls:stage}
        debug: 0
        maintenance: null
    prod:
        appEnv: production
    dev:
        debug: 1


package:
    # Files and directories to exclude from deployment
    patterns:
        - '!.env' # Don't deploy local config
        - '!node_modules/**'
        - '!public/storage'
        - '!resources/assets/**'
        - '!resources/css/**'
        - '!resources/images/**'
        - '!resources/js/**'
        - '!storage/**'
        - '!tests/**'
        - '!database/*.sqlite'
        # Exclude assets except for the manifest file
        - '!public/build/**'
        - 'public/build/manifest.json'

plugins:
    # We need to include the Bref plugin
    - ./vendor/bref/bref
    # Uncomment the Serverless Lift plugin if you use constructs
    # See https://github.com/getlift/lift
    - serverless-lift
